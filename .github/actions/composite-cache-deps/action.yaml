name: Cache Node and NPM Dependencies
description: "This action allow us to cache both Node and NPM dependencies based on the package-lock.json file."

inputs:
  node-version:
    description: "NodeJS version to use"
    default: "26.x"
    required: true
  working-dir:
    description: "The working directory of the application."
    default: "."
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup NodeJS version ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
          node-version: ${{ inputs.node-version }}
    - name: cached dependencies
      uses: actions/cache@v3
      id: cache
      with:
        path: ${{ inputs.working-dir }}/node_modules
        key: node-modules-${{ hashFiles('${{ inputs.working-dir }}/package-lock.json') }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-dir }}
