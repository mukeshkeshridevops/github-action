name: 18 - 1 - Reusable Workflows - Reusable Definition
run-name: 18 - 1 - Reusable Workflows - Reusable Definition | env - ${{ inputs.target-env }}

on:
    workflow_call: # use for reusable workflow definition
        inputs:
          target-directory:
            type: string
            required: true
          target-env:
            type: string
            required: false
        outputs:
          build-status:
            description: The status of the build process
            value: ${{ jobs.deploy.outputs.build-status }}
          url:
            description: The URL of the deployed version
            value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
        build-status: ${{ steps.build.outputs.build-status }}
        url: ${{ steps.deploy.outputs.url }}
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        - name: Build
          id: build
          run: |
            echo "Building using directory ${{ inputs.target-directory }}" >> $GITHUB_OUTPUT
            echo "build-status=success" >> $GITHUB_OUTPUT
        - name: Deploy
          id: deploy
          run: |
            echo "Deploying build artifacts"
            echo "url=https://wwww.google.com" >> $GITHUB_OUTPUT