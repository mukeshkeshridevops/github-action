name: Working with Environments

on: 
    workflow_dispatch:
        inputs:
            target-env:
                type: environment

jobs:
    echo:
        runs-on: ubuntu-latest
        environment: ${{ inputs.target-env }}
        env:
            ENV_NAME: ${{ vars.MY_ENV_VALUE || 'Default Environment Value' }}
        steps:
            - name: Echo vars
              run: |
                echo "Env variable ${{ env.ENV_NAME }}"