name: 04 - Using Actions

on: 
  # push
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
              working-directory: using-actions/react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v4 # custom action to checkout code from the repository

            - name: Setup Node
              uses: actions/setup-node@v6 # custom action to setup Node.js environment
              with:
                node-version: '26.x'

            - name: Install dependencies
              run: |
                npm ci 

            - name: Run Unit Tests
              run: |
                npm run test