name:  19 - 1 - Managing concurrency

on:
  workflow_dispatch:

concurrency:
  group: retrieve thw workflow name $ {{ github.ref }}
  cancel-in-progress: true


jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ping URL
        uses: actions/docker-ping-url@v1
        with:
          url: https://www.google.com
          max_tries: 20
          delay: 5

