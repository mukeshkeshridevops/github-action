name: 08 - Using Variables
on: 
    # push:
    workflow_dispatch:

env:
    WORKFLOW_VAR: 'I am a workflow environment variable'
    OVERERITTEN: 'I will be overwritten'

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: 'I am a job environment variable'
            OVERERITTEN: 'I have been overwritten at job level'
        steps:
            - name: Print Env variables
              env:
                STEP_VAR: 'I am a step environment variable'
                step_var2: 'I am another step environment variable'
              run: |
                echo "Step variable: $ {{ env.STEP_VAR }}"
                echo "Step variable 2: $ {{ env.step_var2 }}"
                echo "Job env variable: $ {{ env.JOB_VAR }}"
                echo "Workflow env variable: $ {{ env.WORKFLOW_VAR }}"
                echo "Overwritten variable: $ {{ env.OVERERITTEN }}"
            - name: Overwrite job variable
              env:
                OVERERITTEN: 'I have been overwritten at step level'
              run: |
                echo "Step level overwritten variable: $ {{ env.OVERERITTEN }}"